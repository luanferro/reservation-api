name: CI - Testes

on:
  pull_request:
    branches:
      - main
      - develop

jobs:
  test:
    name: Rodar testes unitários
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Rodar testes
        run: mvn test --no-transfer-progress